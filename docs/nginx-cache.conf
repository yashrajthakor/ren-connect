# =====================================================================
# RBN — Production reverse proxy cache configuration (Coolify / Nginx)
# ---------------------------------------------------------------------
# Drop this snippet inside your `server { ... }` block. It enforces the
# cache contract the SPA expects:
#
#   - HTML, version.json, service-worker.js, manifest -> never cached
#   - /assets/* (hashed JS/CSS/img)                   -> immutable, 1 year
#   - Everything else                                  -> short revalidate
#
# For Traefik / Caddy equivalents see the bottom of this file.
# =====================================================================

# Gzip + Brotli are safe with hashed filenames.
gzip on;
gzip_types text/plain text/css application/json application/javascript
           application/xml text/xml application/wasm image/svg+xml;
gzip_min_length 1024;
gzip_vary on;

# SPA fallback — every unknown path returns index.html so React Router can route.
location / {
    try_files $uri $uri/ /index.html;
}

# 1) Never cache HTML or the files that decide what version is live.
location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    expires off;
    etag on;
}
location = /version.json {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
}
location = /service-worker.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Service-Worker-Allowed "/" always;
    expires off;
}
location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
}
location ~* ^/(site\.webmanifest|manifest\.webmanifest|manifest\.json)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    expires off;
}

# 2) Hashed bundles can live in cache forever.
location ^~ /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
    try_files $uri =404;
}

# 3) Static images / favicons — short TTL with revalidation.
location ~* \.(?:png|jpg|jpeg|gif|webp|avif|svg|ico)$ {
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
}

# 4) Make sure REST/Realtime are never cached at the proxy.
location ~* ^/(rest|auth|storage|realtime|functions)/ {
    add_header Cache-Control "no-store" always;
    proxy_pass http://supabase;   # adjust to your upstream
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
}

# ---------------------------------------------------------------------
# Traefik equivalent (labels on the service in docker-compose / Coolify):
#
#   labels:
#     - "traefik.http.middlewares.rbn-html-nocache.headers.customResponseHeaders.Cache-Control=no-cache, no-store, must-revalidate"
#     - "traefik.http.middlewares.rbn-assets-immutable.headers.customResponseHeaders.Cache-Control=public, max-age=31536000, immutable"
#     - "traefik.http.routers.rbn-html.rule=PathPrefix(`/`) && !PathPrefix(`/assets/`)"
#     - "traefik.http.routers.rbn-html.middlewares=rbn-html-nocache"
#     - "traefik.http.routers.rbn-assets.rule=PathPrefix(`/assets/`)"
#     - "traefik.http.routers.rbn-assets.middlewares=rbn-assets-immutable"
#
# Caddy equivalent (Caddyfile):
#
#   @html path / /index.html /version.json /service-worker.js /sw.js /site.webmanifest
#   header @html Cache-Control "no-cache, no-store, must-revalidate"
#   @hashed path /assets/*
#   header @hashed Cache-Control "public, max-age=31536000, immutable"
#   try_files {path} /index.html
# ---------------------------------------------------------------------