kind = "web"
previewPath = "/"
title = "RBN - Rajput Business Network"
version = "1.0.0"
id = "artifacts/rbn-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21612

[services.development]
run = "pnpm --filter @workspace/rbn-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rbn-app", "run", "build" ]
publicDir = "artifacts/rbn-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21612"
BASE_PATH = "/"
